name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v3
      - name: Install Rust stable + clippy
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v3
      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: cargo test --workspace

  release:
    name: Release binaries (${{ matrix.artifact }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: filetag-linux-amd64
          - target: aarch64-unknown-linux-gnu
            artifact: filetag-linux-arm64
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v3

      - name: Install Rust stable + target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          ~/.cargo/bin/rustup target add ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p filetag -p filetag-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz filetag filetag-web

      - name: Upload to Forgejo release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          API="${{ github.server_url }}/api/v1"
          ASSET="${{ matrix.artifact }}.tar.gz"

          # Create release (ignore error if it already exists).
          RELEASE=$(curl -s -w "\n%{http_code}" -X POST "$API/repos/$REPO/releases" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"$TAG\", \"draft\": false}")
          HTTP_CODE=$(echo "$RELEASE" | tail -1)
          BODY=$(echo "$RELEASE" | head -1)

          # If creation failed (e.g. release exists), fetch it.
          if [ "$HTTP_CODE" != "201" ]; then
            BODY=$(curl -s "$API/repos/$REPO/releases/tags/$TAG" \
              -H "Authorization: token $GITHUB_TOKEN")
          fi

          RELEASE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Upload asset.
          curl -s -X POST "$API/repos/$REPO/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -F "attachment=@$ASSET"
