name: Nightly

on:
  push:
    tags: ['nightly']

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create (or recreate) the rolling nightly release before build jobs start.
  # Separating this into its own serial job prevents the parallel build jobs
  # from racing to delete/recreate the release and wiping each other's assets.
  create-release:
    name: Create nightly release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Recreate rolling release
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          gh release delete nightly --yes 2>/dev/null || true
          gh release create nightly \
            --title "nightly (${DATE} · ${COMMIT})" \
            --notes "Nightly build from commit \`${COMMIT}\` (${DATE}). Unofficial pre-release." \
            --prerelease
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build (${{ matrix.artifact }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: filetag-linux-amd64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: filetag-macos-arm64
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: filetag-linux-arm64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: filetag-windows-amd64
            ext: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - run: cargo build --release --target ${{ matrix.target }} -p filetag -p filetag-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          cd target/${{ matrix.target }}/release
          tar czf "../../../${{ matrix.artifact }}-nightly-${COMMIT}.tar.gz" filetag filetag-web

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $COMMIT = (git rev-parse --short HEAD).Trim()
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path filetag.exe, filetag-web.exe `
            -DestinationPath "../../../${{ matrix.artifact }}-nightly-${COMMIT}.zip"

      - name: Upload asset
        shell: bash
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          gh release upload nightly "${{ matrix.artifact }}-nightly-${COMMIT}.${{ matrix.ext }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
