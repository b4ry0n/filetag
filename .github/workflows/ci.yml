name: CI

on:
  push:
    branches: [main]
    tags: ['v*', 'nightly']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  release:
    name: Release binaries
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/tags/nightly'
    needs: [check, test]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: filetag-linux-amd64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: filetag-macos-arm64
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: filetag-linux-arm64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: filetag-windows-amd64
            ext: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - run: cargo build --release --target ${{ matrix.target }} -p filetag -p filetag-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz filetag filetag-web
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path filetag.exe, filetag-web.exe -DestinationPath ../../../${{ matrix.artifact }}.zip
      - name: Upload release asset
        shell: bash
        run: |
          if [ "${{ github.ref_name }}" = "nightly" ]; then
            # Ensure the nightly pre-release exists (create or update).
            gh release create "nightly" \
              --title "Nightly build" \
              --notes "Latest build from the main branch." \
              --prerelease 2>/dev/null \
            || gh release edit "nightly" --prerelease --title "Nightly build" 2>/dev/null \
            || true
          else
            gh release create "${{ github.ref_name }}" --generate-notes 2>/dev/null || true
          fi
          gh release upload "${{ github.ref_name }}" "${{ matrix.artifact }}.${{ matrix.ext }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
