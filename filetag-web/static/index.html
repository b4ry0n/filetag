<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filetag</title>
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-logo">🏷</span>
            <span class="header-title">filetag</span>
        </div>
        <div class="header-search">
            <input type="text" id="search-input"
                   placeholder="Search tags (e.g. genre/rock and year>=2020)">
            <button id="search-btn" title="Search">Search</button>
            <button id="search-clear" title="Clear search" hidden>Clear</button>
        </div>
        <div class="header-right">
            <span id="db-info" class="db-info"></span>
        </div>
    </header>
    <div class="layout" id="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Tags</h3>
            </div>
            <div class="sidebar-content" id="tag-list"></div>
        </aside>
        <main class="main">
            <div class="toolbar">
                <nav class="breadcrumb" id="breadcrumb"></nav>
                <div class="toolbar-right">
                    <span id="entry-count" class="entry-count"></span>
                    <button id="detail-toggle" class="view-btn active" title="Toggle info pane" onclick="toggleDetailPanel()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <rect x="15" y="3" width="6" height="18" rx="0"/>
                        </svg>
                    </button>
                    <div class="view-toggle">
                        <button id="view-grid" class="view-btn active" title="Grid view">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="7" height="7" rx="1"/>
                            </svg>
                        </button>
                        <button id="view-list" class="view-btn" title="List view">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="4" width="18" height="2" rx="1"/>
                                <rect x="3" y="11" width="18" height="2" rx="1"/>
                                <rect x="3" y="18" width="18" height="2" rx="1"/>
                            </svg>
                        </button>
                    </div>
                    <button id="hidden-toggle" class="view-btn" title="Show hidden files" onclick="toggleShowHidden()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                    <input type="range" id="zoom-slider" class="zoom-slider" min="80" max="240" value="140" step="10" title="Icon size">
                    <button class="view-btn" id="cache-clear-page-btn" title="Refresh thumbnails on this page" onclick="clearCache(false)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 .49-3.89"/>
                        </svg>
                    </button>
                    <button class="view-btn" id="cache-clear-btn" title="Clear entire thumbnail cache and reload" onclick="clearCache(true)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 .49-3.89"/>
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="content" class="file-grid"></div>
        </main>
        <aside class="detail" id="detail">
            <div class="detail-empty">Select a file or folder to see details</div>
        </aside>
    </div>
    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)" hidden>
        <button class="lightbox-close" onclick="closeLightbox()" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <div class="lightbox-content" id="lightbox-content"></div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
