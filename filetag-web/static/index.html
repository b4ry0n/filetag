<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filetag</title>
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-logo">🏷</span>
            <span class="header-title">filetag</span>
        </div>
        <div class="header-search">
            <input type="text" id="search-input"
                   placeholder="Search tags (e.g. genre/rock and year>=2020)">
            <button id="search-btn" title="Search">Search</button>
            <button id="search-clear" title="Clear search" hidden>Clear</button>
        </div>
        <div class="header-right">
            <span id="db-info" class="db-info"></span>
        </div>
    </header>
    <div class="layout" id="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Tags</h3>
            </div>
            <div class="sidebar-content" id="tag-list"></div>
        </aside>
        <main class="main">
            <div class="toolbar">
                <nav class="breadcrumb" id="breadcrumb"></nav>
                <div class="toolbar-right">
                    <span id="entry-count" class="entry-count"></span>
                    <button id="detail-toggle" class="view-btn active" title="Toggle info pane" onclick="toggleDetailPanel()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <rect x="15" y="3" width="6" height="18" rx="0"/>
                        </svg>
                    </button>
                    <div class="view-toggle">
                        <button id="view-grid" class="view-btn active" title="Grid view">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="7" height="7" rx="1"/>
                            </svg>
                        </button>
                        <button id="view-list" class="view-btn" title="List view">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="3" y="4" width="18" height="2" rx="1"/>
                                <rect x="3" y="11" width="18" height="2" rx="1"/>
                                <rect x="3" y="18" width="18" height="2" rx="1"/>
                            </svg>
                        </button>
                    </div>
                    <button id="hidden-toggle" class="view-btn" title="Show hidden files" onclick="toggleShowHidden()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                    <input type="range" id="zoom-slider" class="zoom-slider" min="80" max="240" value="140" step="10" title="Icon size">
                    <div class="split-btn" id="cache-btn-wrap">
                        <button class="view-btn" id="cache-clear-page-btn" title="Refresh thumbnails on this page" onclick="clearCache(false)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"/>
                                <path d="M3.51 15a9 9 0 1 0 .49-3.89"/>
                            </svg>
                        </button>
                        <button class="view-btn split-btn-arrow" title="More cache options" onclick="toggleCacheMenu(event)">
                            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
                                <path d="M1 3l4 4 4-4"/>
                            </svg>
                        </button>
                        <div class="toolbar-dropdown" id="cache-menu" hidden>
                            <button onclick="clearCache(true)">Clear entire cache</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="content" class="file-grid"></div>
        </main>
        <aside class="detail" id="detail">
            <div class="detail-empty">Select a file or folder to see details</div>
        </aside>
    </div>
    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)" hidden>
        <button class="lightbox-close" onclick="closeLightbox()" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <div class="lightbox-content" id="lightbox-content"></div>
    </div>

    <!-- Comic viewer -->
    <div id="comic-viewer" class="comic-viewer" hidden>
        <div class="cv-toolbar">
            <button class="cv-btn" onclick="cvPrev()" title="Previous page (←)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="cv-status" class="cv-status"></span>
            <button class="cv-btn" onclick="cvNext()" title="Next page (→)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button class="cv-btn" id="cv-spread-btn" onclick="cvToggleSpread()" title="Two-page spread">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="9" height="18" rx="1"/>
                    <rect x="13" y="3" width="9" height="18" rx="1"/>
                </svg>
            </button>
            <button class="cv-btn" id="cv-fs-btn" onclick="cvToggleFullscreen()" title="Full screen (F)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
            <button class="cv-btn cv-close" onclick="closeComicViewer()" title="Close (Esc)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="cv-stage" id="cv-stage" onclick="cvClickNav(event)">
            <div class="cv-pages" id="cv-pages"></div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
