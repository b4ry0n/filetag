  # -------------------------------------------------------------------------
  # Face detection
  # -------------------------------------------------------------------------
  /api/face/analyse:
    post:
      summary: Run face detection on a single file
      operationId: faceAnalyse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                dir:
                  $ref: '#/components/schemas/Dir'
                root_id:
                  $ref: '#/components/schemas/RootId'
      responses:
        '200':
          description: Detection results

  /api/face/detections:
    get:
      summary: List face detections for a file
      operationId: listFaceDetections
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: dir
          in: query
          schema:
            $ref: '#/components/schemas/Dir'
        - name: root_id
          in: query
          schema:
            $ref: '#/components/schemas/RootId'
      responses:
        '200':
          description: Detection list

  /api/face/assign:
    post:
      summary: Assign a name to a face detection
      operationId: faceAssign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [detection_id, name]
              properties:
                detection_id:
                  type: integer
                name:
                  type: string
                dir:
                  $ref: '#/components/schemas/Dir'
                root_id:
                  $ref: '#/components/schemas/RootId'
      responses:
        '200':
          description: OK

  /api/face/config:
    get:
      summary: Get face detection configuration
      operationId: getFaceConfig
      parameters:
        - name: dir
          in: query
          schema:
            $ref: '#/components/schemas/Dir'
        - name: root_id
          in: query
          schema:
            $ref: '#/components/schemas/RootId'
      responses:
        '200':
          description: Configuration object

    post:
      summary: Update face detection configuration
      operationId: setFaceConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                confidence:
                  type: number
                cluster_distance:
                  type: number
                tag_prefix:
                  type: string
                dir:
                  $ref: '#/components/schemas/Dir'
                root_id:
                  $ref: '#/components/schemas/RootId'
      responses:
        '200':
          description: OK

  /api/face/status:
    get:
      summary: Face detection progress
      operationId: getFaceStatus
      responses:
        '200':
          description: Progress object

