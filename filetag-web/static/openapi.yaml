    get:
      summary: AI analysis progress
      operationId: getAiStatus
      responses:
        '200':
          description: Progress object

  /api/ai/chat:
    post:
      summary: Send a chat message to the VLM (with optional file context)
      operationId: aiChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
