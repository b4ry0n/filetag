        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Root-relative file path.
      responses:
        '200':
          description: File content
        '206':
          description: Partial content

  /thumb/{path}:
    get:
      summary: Serve a thumbnail JPEG for a file
      operationId: thumbFile
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JPEG thumbnail

